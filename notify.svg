<svg xmlns="http://www.w3.org/2000/svg" width="800" height="48" viewBox="0 0 800 48">
  <defs>
    <!-- Green LED glow -->
    <filter id="ledglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Border glow -->
    <filter id="borderglow" x="-2%" y="-10%" width="104%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="tickerclip">
      <rect x="30" y="0" width="740" height="48"/>
    </clipPath>
  </defs>

  <rect width="800" height="48" rx="8" fill="#080e08"/>

  <rect x="1" y="1" width="798" height="46" rx="7"
        fill="none" stroke="#00cc44" stroke-width="2"
        opacity="0.7" filter="url(#borderglow)"/>

  <rect x="3" y="3" width="794" height="42" rx="6"
        fill="none" stroke="#003311" stroke-width="1" opacity="0.9"/>

  <circle cx="17" cy="24" r="6" fill="#00ee55" filter="url(#ledglow)">
    <animate attributeName="opacity" values="1;0.12;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="783" cy="24" r="6" fill="#00ee55" filter="url(#ledglow)">
    <animate attributeName="opacity" values="0.12;1;0.12" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <g clip-path="url(#tickerclip)">
    <text
      font-family="'Courier New', Courier, monospace"
      font-size="16"
      font-weight="900"
      letter-spacing="0.5"
      fill="#00ee55"
      y="30"
      filter="url(#ledglow)">

      <tspan>&#9679; Resume Screening &amp; SOP Results Out  &#9670;  Selection Test Scheduled for 28th June  &#9670;&#9670;&#9670;  &#9679; Resume Screening &amp; SOP Results Out  &#9670;  Selection Test Scheduled for 28th June  &#9670;&#9670;&#9670;  </tspan>

      <animateTransform
        attributeName="transform"
        type="translate"
        from="800,0"
        to="-1750,0"
        dur="22s"
        repeatCount="indefinite"/>
    </text>
  </g>
</svg>
